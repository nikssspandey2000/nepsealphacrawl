name: Daily NEPSE Scraper

on:
  schedule:
    - cron: '15 11 * * *'  # 5 PM Nepal Time (NPT = UTC+5:45)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run scraper
        run: python Crawler.py Link

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nepsealpha.xlsx crawler_debug.log index.html *.csv
          git diff --staged --quiet || git commit -m "Auto-update: NEPSE data $(date +'%Y-%m-%d')"
          git push
