name: Daily NEPSE Scraper

on:
  schedule:
    - cron: '15 11 * * *'  # 5:00 PM Nepal Time (NPT = UTC+5:45)
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run scraper
        run: python Crawler.py Link

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nepsealpha.xlsx crawler_debug.log index.html *.csv || true
          git diff --staged --quiet || git commit -m "Auto-update: NEPSE data $(date +'%Y-%m-%d %H:%M NPT')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
